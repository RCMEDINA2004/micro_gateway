server.port=8080

# Base de datos del gateway
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:gateway_db}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:velkyvet_secret_key_2024}

# URLs de los microservicios internos
services.auth=${AUTH_SERVICE_URL:http://localhost:8081}
services.pets=${PETS_SERVICE_URL:http://localhost:8082}
services.appointments=${APPOINTMENTS_SERVICE_URL:http://localhost:8083}
