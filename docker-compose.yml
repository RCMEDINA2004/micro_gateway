services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"

  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gateway_db
      DB_USER: user
      DB_PASSWORD: password
      JWT_SECRET: velkyvet_secret_key_2024
    depends_on:
      - postgres